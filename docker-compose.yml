services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - GALLERY_DIR=/data/gallery
      # PIN, mit der die Galerie entsperrt wird (bitte anpassen!)
      - GALLERY_PIN=1234
    volumes:
      # Bilder hier reinlegen -> erscheinen automatisch in der Galerie
      - ./gallery-images:/data/gallery
    networks:
      - proxy
    restart: unless-stopped

networks:
  proxy:
    external: true
